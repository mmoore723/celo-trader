# Nginx config for celotrader.com
# EC2 (Amazon Linux / CentOS) uses conf.d/ — NOT sites-available/sites-enabled/
#
# Deploy on EC2:
#   sudo cp /opt/celo_trader/nginx_celotrader.conf /etc/nginx/conf.d/celotrader.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# To apply after git pull + frontend rebuild:
#   cd /opt/celo_trader && git pull
#   cd frontend && npm run build && cd ..
#   sudo systemctl restart celo-dashboard.service

server {
    listen 80;
    server_name celotrader.com www.celotrader.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name celotrader.com www.celotrader.com;

    # SSL — adjust paths to match your cert (certbot default shown)
    ssl_certificate     /etc/letsencrypt/live/celotrader.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/celotrader.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Proxy everything to FastAPI on port 8501 ────────────────────────────
    # This serves the React SPA at celotrader.com/ (root), not /performance/.
    # URLs will be:
    #   celotrader.com/#/           → Live Trading
    #   celotrader.com/#/performance → Performance
    #   celotrader.com/#/backtest   → Backtest
    #   etc.

    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket support (required for the Bot Thinking panel)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running backtest requests
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }
}
